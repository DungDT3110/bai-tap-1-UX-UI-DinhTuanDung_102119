<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Mobile Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
  </head>
  <body id="page-home">
    <header>
      <h1>City Explorer</h1>
      <button type="button"><i class="ph-bold ph-magnifying-glass"></i></button>
    </header>

    <main>
      <section class="hero">
        <h2>Chào mừng trở lại</h2>
        <p>Lên kế hoạch cho cuối tuần chỉ với một lần chạm.</p>
      </section>

      <section>
        <h2>Địa điểm phổ biến</h2>
        <article>
          <div class="card-content">
            <h3>Chợ Phố Cổ</h3>
            <p>Ẩm thực & Thủ công</p>
          </div>
          <button type="button">Xem ngay</button>
        </article>
        <article>
          <div class="card-content">
            <h3>Đường Đi Bộ Ven Sông</h3>
            <p>Đường mòn buổi sáng</p>
          </div>
          <button type="button">Xem ngay</button>
        </article>
        <article>
          <div class="card-content">
            <h3>Phố Nghệ Thuật</h3>
            <p>Sự kiện cuối tuần</p>
          </div>
          <button type="button">Xem ngay</button>
        </article>
      </section>
    </main>

    <nav>
      <a href="#" class="active"><i class="ph-bold ph-house"></i><span>Home</span></a>
      <a href="#"><i class="ph-bold ph-map-trifold"></i><span>Map</span></a>
      <a href="#"><i class="ph-bold ph-heart"></i><span>Saved</span></a>
      <a href="#"><i class="ph-bold ph-user"></i><span>Profile</span></a>
    </nav>
</body>
